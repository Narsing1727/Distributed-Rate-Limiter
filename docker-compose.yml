version: "3.8"

services:

  api1:
    build: .
    ports:
      - "3001:3000"
    depends_on:
      - redis1
      - redis2
      - redis3
    networks:
      - app-network

  api2:
    build: .
    ports:
      - "3002:3000"
    depends_on:
      - redis1
      - redis2
      - redis3
    networks:
      - app-network

  api3:
    build: .
    ports:
      - "3003:3000"
    depends_on:
      - redis1
      - redis2
      - redis3
    networks:
      - app-network

  router:
    build: ./router
    
    ports:
      - "4000:4000"
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - router
    networks:
      - app-network

  redis1:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  redis2:
    image: redis:7
    ports:
      - "6380:6379"
    networks:
      - app-network

  redis3:
    image: redis:7
    ports:
      - "6381:6379"
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

networks:
  app-network: